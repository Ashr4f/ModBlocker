name: build
on:
  push:
    branches: ['**']
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.x

      - name: Build patcher
        run: dotnet build src -c Release
      - name: Build companion plugin
        run: dotnet build src/Plugin -c Release

      - name: Assemble Thunderstore package
        shell: pwsh
        run: |
          Copy-Item src/bin/Release/net472/ModBlocker.dll thunderstore/patchers/ -Force
          Copy-Item src/Plugin/bin/Release/net472/ModBlockerUI.dll thunderstore/plugins/ -Force
          $v = (Get-Content thunderstore/manifest.json | ConvertFrom-Json).version_number
          Compress-Archive -Path thunderstore/* -DestinationPath "ModBlocker-$v.zip" -Force
          echo "Package: ModBlocker-$v.zip"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ModBlocker-package
          path: ModBlocker-*.zip

      - name: GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ModBlocker-*.zip
